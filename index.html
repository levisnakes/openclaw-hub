<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss: http: https:;">
  <title>OpenClaw Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">🦁</span>
        <span class="logo-text">OpenClaw</span>
      </div>
      
      <nav class="nav-tabs">
        <button class="nav-btn active" data-tab="chat">
          <span class="nav-icon">💬</span>
          <span class="nav-label">Chat</span>
        </button>
        <button class="nav-btn" data-tab="terminal">
          <span class="nav-icon">⌨️</span>
          <span class="nav-label">Terminal</span>
        </button>
        <button class="nav-btn" data-tab="sessions">
          <span class="nav-icon">📋</span>
          <span class="nav-label">Sessions</span>
        </button>
        <button class="nav-btn" data-tab="nodes">
          <span class="nav-icon">🖥️</span>
          <span class="nav-label">Nodes</span>
        </button>
        <button class="nav-btn" data-tab="ollama">
          <span class="nav-icon">🧠</span>
          <span class="nav-label">Ollama</span>
        </button>
        <button class="nav-btn" data-tab="cron">
          <span class="nav-icon">⏰</span>
          <span class="nav-label">Cron</span>
        </button>
        <button class="nav-btn" data-tab="settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">Settings</span>
        </button>
      </nav>
      
      <div class="connection-status" id="connectionStatus">
        <span class="status-dot offline"></span>
        <span class="status-text">Disconnected</span>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="header">
        <h1 class="tab-title" id="tabTitle">Chat</h1>
        <div class="header-actions">
          <button class="header-btn" id="gatewayStatus" title="Gateway Status">
            <span class="status-indicator"></span>
          </button>
        </div>
      </header>

      <!-- Chat Tab -->
      <section class="tab-content active" id="tab-chat">
        <div class="chat-container">
          <div class="channel-list" id="channelList">
            <div class="channel-header">
              <span>Channels</span>
              <button class="icon-btn">+</button>
            </div>
            <div class="channels" id="channels">
              <!-- Populated dynamically -->
            </div>
          </div>
          <div class="chat-view">
            <div class="chat-messages" id="chatMessages">
              <!-- Messages go here -->
              <div class="welcome-message">
                <h2>Welcome to OpenClaw Hub</h2>
                <p>Select a channel to start chatting</p>
              </div>
            </div>
            <div class="chat-input-container">
              <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1"></textarea>
              <button class="send-btn" id="sendBtn">Send</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Terminal Tab -->
      <section class="tab-content" id="tab-terminal">
        <div class="terminal-container">
          <div class="terminal-header">
            <select id="terminalType">
              <option value="gateway">OpenClaw Gateway</option>
              <option value="ssh">SSH to Pi</option>
              <option value="local">Local Shell</option>
            </select>
            <div class="terminal-actions">
              <button class="icon-btn" id="terminalClear" title="Clear">🗑️</button>
              <button class="icon-btn" id="terminalKill" title="Kill Session">⏹️</button>
            </div>
          </div>
          <div class="terminal-wrapper" id="terminal"></div>
        </div>
      </section>

      <!-- Sessions Tab -->
      <section class="tab-content" id="tab-sessions">
        <div class="sessions-container">
          <div class="panel">
            <div class="panel-header">
              <h3>Active Sessions</h3>
              <button class="btn btn-primary" id="spawnSessionBtn">+ New Session</button>
            </div>
            <div class="sessions-list" id="sessionsList">
              <!-- Populated dynamically -->
            </div>
          </div>
        </div>
      </section>

      <!-- Nodes Tab -->
      <section class="tab-content" id="tab-nodes">
        <div class="nodes-container">
          <div class="panel">
            <div class="panel-header">
              <h3>Connected Nodes</h3>
              <button class="btn btn-secondary" id="refreshNodesBtn">🔄 Refresh</button>
            </div>
            <div class="nodes-grid" id="nodesGrid">
              <!-- Populated dynamically -->
            </div>
          </div>
        </div>
      </section>

      <!-- Ollama Tab -->
      <section class="tab-content" id="tab-ollama">
        <div class="ollama-container">
          <div class="panel">
            <div class="panel-header">
              <h3>Model Selection</h3>
            </div>
            <div class="model-selector">
              <label>Current Model:</label>
              <select id="modelSelect" class="model-dropdown">
                <!-- Populated dynamically -->
              </select>
              <button class="btn btn-primary" id="setModelBtn">Set Model</button>
            </div>
          </div>
          <div class="panel">
            <div class="panel-header">
              <h3>Available Models</h3>
              <button class="btn btn-secondary" id="refreshModelsBtn">🔄 Refresh</button>
            </div>
            <div class="models-list" id="modelsList">
              <!-- Populated dynamically -->
            </div>
          </div>
        </div>
      </section>

      <!-- Cron Tab -->
      <section class="tab-content" id="tab-cron">
        <div class="cron-container">
          <div class="panel">
            <div class="panel-header">
              <h3>Scheduled Jobs</h3>
              <button class="btn btn-primary" id="addCronBtn">+ Add Job</button>
            </div>
            <div class="cron-list" id="cronList">
              <!-- Populated dynamically -->
            </div>
          </div>
        </div>
      </section>

      <!-- Settings Tab -->
      <section class="tab-content" id="tab-settings">
        <div class="settings-container">
          <div class="panel">
            <div class="panel-header">
              <h3>Gateway Connection</h3>
            </div>
            <div class="form-group">
              <label>Gateway URL:</label>
              <input type="text" id="gatewayUrl" placeholder="http://raspberrypi:8080">
            </div>
            <div class="form-group">
              <label>API Key:</label>
              <input type="password" id="apiKey" placeholder="Optional">
            </div>
            <button class="btn btn-primary" id="connectBtn">Connect</button>
          </div>
          
          <div class="panel">
            <div class="panel-header">
              <h3>Appearance</h3>
            </div>
            <div class="form-group">
              <label>Theme:</label>
              <select id="themeSelect">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
                <option value="system">System</option>
              </select>
            </div>
          </div>
          
          <div class="panel">
            <div class="panel-header">
              <h3>Gateway Configuration</h3>
            </div>
            <div class="config-editor">
              <textarea id="configEditor" rows="10" spellcheck="false"></textarea>
            </div>
            <div class="form-actions">
              <button class="btn btn-secondary" id="reloadConfigBtn">Reload</button>
              <button class="btn btn-primary" id="saveConfigBtn">Save Config</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
